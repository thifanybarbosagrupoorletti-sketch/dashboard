<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Conectando...</title>
<style>
body{font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f0f4ff;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top:4px solid #1e3c72;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#444;font-size:1em}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Conectando ao Google Drive...</p>
<script>
// Get token from URL hash
var hash = window.location.hash.substring(1);
var params = {};
hash.split('&').forEach(function(pair){
  var kv = pair.split('=');
  params[kv[0]] = decodeURIComponent(kv[1]||'');
});

if(params.access_token){
  // Save token to localStorage
  var TOKEN_KEY = 'gdrive_token_v1';
  var expiresIn = parseInt(params.expires_in||'3600');
  var tokenData = JSON.stringify({
    access_token: params.access_token,
    expires: Date.now() + (expiresIn - 60) * 1000
  });
  localStorage.setItem(TOKEN_KEY, tokenData);
  // Force redirect to dashboard with cache-busting
  window.location.replace('https://thifanybarbosagrupoorletti-sketch.github.io/dashboard/?_=' + Date.now());
} else {
  document.querySelector('p').textContent = 'Erro na autenticação. Redirecionando...';
  setTimeout(function(){
    window.location.replace('https://thifanybarbosagrupoorletti-sketch.github.io/dashboard/');
  }, 2000);
}
</script>
</body>
</html>
